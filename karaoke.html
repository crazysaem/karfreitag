<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karaoke</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a0a;
  color: #e0e0e0;
  min-height: 100vh;
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  border-radius: 6px;
  padding: 8px 16px;
  font-size: 14px;
  background: #2a2a2a;
  color: #e0e0e0;
  transition: background 0.15s;
}
button:hover { background: #3a3a3a; }
button:active { background: #444; }

.view { display: none; }
.view.active { display: flex; flex-direction: column; }

/* ── Landing / Song Picker ── */
#picker-view {
  align-items: center;
  padding: 40px 20px;
  min-height: 100vh;
}

#picker-view h1 {
  font-size: 28px;
  margin-bottom: 24px;
  color: #fff;
}

#open-folder-btn, #file-input-label {
  background: linear-gradient(135deg, #00bcd4, #e040fb);
  color: #fff;
  font-size: 16px;
  padding: 12px 28px;
  border-radius: 8px;
  font-weight: 600;
  margin-bottom: 32px;
}
#open-folder-btn:hover, #file-input-label:hover {
  filter: brightness(1.1);
}

#file-input { display: none; }
#file-input-label { display: inline-block; cursor: pointer; }

#song-list {
  width: 100%;
  max-width: 600px;
  list-style: none;
}

#song-list li {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: #1a1a1a;
  border-radius: 8px;
  margin-bottom: 8px;
  transition: background 0.15s;
}
#song-list li:hover { background: #222; }

.song-name {
  flex: 1;
  cursor: pointer;
  font-size: 15px;
}

.song-actions button {
  margin-left: 8px;
  font-size: 13px;
  padding: 6px 12px;
}
.song-actions .edit-btn {
  background: #1a3a4a;
  color: #00bcd4;
}

/* ── Karaoke Player ── */
#player-view {
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  position: relative;
  background: #000;
  overflow: hidden;
}

#player-controls {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  background: rgba(0,0,0,0.85);
  z-index: 10;
}

#player-controls button { font-size: 18px; background: none; padding: 4px 8px; border-radius: 6px; }
#player-controls button:hover { background: rgba(255,255,255,0.1); }
#player-controls button:active { background: rgba(255,255,255,0.2); }

#seek-bar {
  flex: 1;
  height: 4px;
  accent-color: #00bcd4;
  cursor: pointer;
}

#player-time {
  font-size: 13px;
  color: #888;
  min-width: 90px;
  text-align: right;
}

#player-back { position: fixed; top: 16px; left: 16px; z-index: 10; font-size: 20px; background: rgba(0,0,0,0.6); transition: background 0.15s; }
#player-back:hover { background: rgba(255,255,255,0.15); }

#lyrics-display {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 60px 40px 100px;
  min-height: 100vh;
  text-align: center;
}

.lyric-line {
  font-size: 36px;
  font-weight: 700;
  line-height: 1.4;
  color: #555;
  transition: color 0.2s;
  white-space: pre-wrap;
}

.lyric-line.active { color: #fff; }
.lyric-line.past { color: #444; }

.lyric-word {
  display: inline;
  position: relative;
  background-clip: text;
  -webkit-background-clip: text;
}

.lyric-word.sung {
  color: transparent;
  background-image: linear-gradient(90deg, #00e5ff, #e040fb);
  -webkit-background-clip: text;
  background-clip: text;
}

.lyric-word.singing {
  color: transparent;
  -webkit-background-clip: text;
  background-clip: text;
}

/* ── LRC Editor ── */
#editor-view {
  padding: 20px;
  min-height: 100vh;
}

#editor-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

#editor-header h2 {
  flex: 1;
  font-size: 20px;
  color: #fff;
}

#editor-header button {
  padding: 8px 20px;
}

.editor-save-btn {
  background: linear-gradient(135deg, #00bcd4, #e040fb) !important;
  color: #fff !important;
  font-weight: 600;
}

#editor-audio-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding: 12px;
  background: #1a1a1a;
  border-radius: 8px;
  position: sticky;
  top: 0;
  z-index: 10;
}

#editor-audio-controls button { font-size: 16px; background: none; padding: 4px 8px; border-radius: 6px; transition: background 0.15s; }
#editor-audio-controls button:hover { background: rgba(255,255,255,0.1); }
#editor-audio-controls button:active { background: rgba(255,255,255,0.2); }

#editor-seek {
  flex: 1;
  height: 4px;
  accent-color: #00bcd4;
}

#editor-time {
  font-size: 13px;
  color: #888;
  min-width: 110px;
  text-align: right;
  font-family: monospace;
}

#editor-lines {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
}

.editor-line {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 10px 12px;
  background: #141414;
  border-radius: 8px;
  flex-wrap: wrap;
}

.editor-line-time {
  font-size: 12px;
  color: #00bcd4;
  min-width: 60px;
  padding-top: 6px;
  font-family: monospace;
  cursor: text;
  outline: none;
  border-bottom: 1px solid transparent;
}
.editor-line-time:focus { border-bottom-color: #00bcd4; }

.editor-words {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  flex: 1;
  min-height: 32px;
}

.editor-word {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #222;
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 13px;
  cursor: grab;
}

.editor-word .word-time {
  font-size: 10px;
  color: #888;
  font-family: monospace;
  cursor: text;
  outline: none;
  border-bottom: 1px solid transparent;
}
.editor-word .word-time:focus { border-bottom-color: #00bcd4; }

.editor-word .word-text {
  cursor: text;
  min-width: 20px;
  outline: none;
  border-bottom: 1px solid transparent;
}
.editor-word .word-text:focus {
  border-bottom-color: #00bcd4;
}

.editor-word .word-delete {
  cursor: pointer;
  color: #666;
  font-size: 12px;
  padding: 0 2px;
}
.editor-word .word-delete:hover { color: #f44; }


.editor-line-actions {
  display: flex;
  gap: 4px;
  padding-top: 4px;
}

.editor-line-actions button {
  font-size: 12px;
  padding: 4px 8px;
  background: #1a1a1a;
  transition: background 0.15s, color 0.15s;
}
.editor-line-actions button:hover { background: #2a2a3a; color: #fff; }
.editor-line-actions button:active { background: #3a3a4a; }

.line-delete-btn:hover { background: #3a1a1a !important; color: #f44 !important; }

.editor-word.editor-word-active {
  background: #003a4a;
  outline: 2px solid #00bcd4;
}

.editor-line.editor-line-active {
  background: #1a1a2a;
}

#add-line-btn {
  align-self: flex-start;
  margin-top: 8px;
}
</style>
</head>
<body>

<!-- ── Song Picker View ── -->
<div id="picker-view" class="view active">
  <h1>Karaoke</h1>
  <div id="open-controls"></div>
  <ul id="song-list"></ul>
</div>

<!-- ── Karaoke Player View ── -->
<div id="player-view" class="view">
  <button id="player-back" title="Back">&#8592;</button>
  <div id="lyrics-display"></div>
  <div id="player-controls">
    <button id="play-pause-btn">&#9654;</button>
    <input type="range" id="seek-bar" min="0" max="100" step="0.1" value="0">
    <span id="player-time">0:00 / 0:00</span>
  </div>
  <audio id="player-audio"></audio>
</div>

<!-- ── LRC Editor View ── -->
<div id="editor-view" class="view">
  <div id="editor-header">
    <button id="editor-back">&#8592; Back</button>
    <h2 id="editor-title"></h2>
    <button id="editor-play-btn">&#9654; Play</button>
    <button id="editor-save-btn" class="editor-save-btn">Save</button>
  </div>
  <div id="editor-audio-controls">
    <button id="editor-play-pause">&#9654;</button>
    <input type="range" id="editor-seek" min="0" max="100" step="0.1" value="0">
    <span id="editor-time">0:00 / 0:00</span>
  </div>
  <div id="editor-lines"></div>
  <button id="add-line-btn">+ Add Line</button>
  <audio id="editor-audio"></audio>
</div>

<script>
// ── State ──
const songs = new Map(); // name → { audioBlob, lrcText, lrcFileHandle? }
const isChromium = !!window.showDirectoryPicker;
let currentSong = null;
let parsedLines = [];
let playerAnim = null;

// ── LRC Parser ──
function parseLRC(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const result = [];
  for (const line of lines) {
    const lineMatch = line.match(/^\[(\d+):(\d+\.\d+)\]\s*(.*)/);
    if (!lineMatch) continue;
    const startTime = parseInt(lineMatch[1]) * 60 + parseFloat(lineMatch[2]);
    const rest = lineMatch[3];
    const words = [];
    const wordRe = /<(\d+):(\d+\.\d+)>([^<]*)/g;
    let m;
    while ((m = wordRe.exec(rest)) !== null) {
      const time = parseInt(m[1]) * 60 + parseFloat(m[2]);
      const text = m[3].trimEnd();
      if (text) words.push({ time, text });
    }
    if (words.length > 0) {
      result.push({ startTime, words });
    }
  }
  return result;
}

function formatTime(t) {
  const m = Math.floor(t / 60);
  const s = (t % 60).toFixed(2).padStart(5, '0');
  return `${String(m).padStart(2, '0')}:${s}`;
}

function serializeLRC(lines) {
  return lines.map(line => {
    const lineTag = `[${formatTime(line.startTime)}]`;
    const wordTags = line.words.map(w => `<${formatTime(w.time)}>${w.text}`).join(' ');
    return `${lineTag} ${wordTags}`;
  }).join('\n') + '\n';
}

function parseTimeInput(str) {
  str = str.trim();
  const m = str.match(/^(\d+):(\d+(?:\.\d+)?)$/);
  if (!m) return null;
  const result = parseInt(m[1]) * 60 + parseFloat(m[2]);
  return isNaN(result) ? null : Math.max(0, result);
}

function saveCaretPos(el) {
  const sel = window.getSelection();
  if (sel.rangeCount === 0) return 0;
  const range = sel.getRangeAt(0);
  return range.startOffset;
}

function restoreCaretPos(el, pos) {
  const textNode = el.firstChild;
  if (!textNode) return;
  const offset = Math.min(pos, textNode.length);
  const range = document.createRange();
  range.setStart(textNode, offset);
  range.collapse(true);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

function formatDisplay(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${String(s).padStart(2, '0')}`;
}

function formatDisplayMs(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  const ms = Math.floor((seconds % 1) * 100);
  return `${m}:${String(s).padStart(2, '0')}.${String(ms).padStart(2, '0')}`;
}

// ── File Loading ──
// ── IndexedDB helpers for persisting directory handle ──
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('karaoke', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('state');
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveDirHandle(handle) {
  const db = await openDB();
  const tx = db.transaction('state', 'readwrite');
  tx.objectStore('state').put(handle, 'dirHandle');
  return new Promise((resolve, reject) => {
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function loadDirHandle() {
  const db = await openDB();
  const tx = db.transaction('state', 'readonly');
  const req = tx.objectStore('state').get('dirHandle');
  return new Promise((resolve) => {
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => resolve(null);
  });
}

function setupFileLoading() {
  const container = document.getElementById('open-controls');
  if (isChromium) {
    const btn = document.createElement('button');
    btn.id = 'open-folder-btn';
    btn.textContent = 'Open Folder';
    btn.onclick = openFolder;
    container.appendChild(btn);
    // Try to restore previous directory
    tryRestoreFolder();
  } else {
    const input = document.createElement('input');
    input.type = 'file';
    input.id = 'file-input';
    input.multiple = true;
    input.accept = '.mp3,.lrc';
    input.onchange = handleFileInput;
    const label = document.createElement('label');
    label.id = 'file-input-label';
    label.htmlFor = 'file-input';
    label.textContent = 'Select MP3 & LRC Files';
    container.appendChild(input);
    container.appendChild(label);
  }
}

async function tryRestoreFolder() {
  const handle = await loadDirHandle();
  if (!handle) return;
  const perm = await handle.queryPermission({ mode: 'readwrite' });
  if (perm === 'granted') {
    await loadFromDirHandle(handle);
  } else {
    // Show a "Reload last folder" button that triggers the permission prompt
    const container = document.getElementById('open-controls');
    const btn = document.createElement('button');
    btn.id = 'restore-folder-btn';
    btn.textContent = 'Reload: ' + handle.name;
    btn.style.marginLeft = '12px';
    btn.onclick = async () => {
      const req = await handle.requestPermission({ mode: 'readwrite' });
      if (req === 'granted') {
        btn.remove();
        await loadFromDirHandle(handle);
      }
    };
    container.appendChild(btn);
  }
}

async function openFolder() {
  try {
    const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    await saveDirHandle(dirHandle);
    await loadFromDirHandle(dirHandle);
  } catch (e) {
    // User cancelled
  }
}

async function loadFromDirHandle(dirHandle) {
  const files = {};
  for await (const entry of dirHandle.values()) {
    if (entry.kind !== 'file') continue;
    const name = entry.name;
    const ext = name.slice(name.lastIndexOf('.')).toLowerCase();
    const base = name.slice(0, name.lastIndexOf('.'));
    if (!files[base]) files[base] = {};
    if (ext === '.mp3') {
      const file = await entry.getFile();
      files[base].audioBlob = URL.createObjectURL(file);
    } else if (ext === '.lrc') {
      const file = await entry.getFile();
      files[base].lrcText = await file.text();
      files[base].lrcFileHandle = entry;
    }
  }
  songs.clear();
  for (const [name, data] of Object.entries(files)) {
    if (data.audioBlob && data.lrcText) {
      songs.set(name, data);
    }
  }
  renderSongList();
}

function handleFileInput(e) {
  const fileList = Array.from(e.target.files);
  const files = {};
  const readers = fileList.map(file => {
    const name = file.name;
    const ext = name.slice(name.lastIndexOf('.')).toLowerCase();
    const base = name.slice(0, name.lastIndexOf('.'));
    if (!files[base]) files[base] = {};
    if (ext === '.mp3') {
      files[base].audioBlob = URL.createObjectURL(file);
      return Promise.resolve();
    } else if (ext === '.lrc') {
      return file.text().then(text => { files[base].lrcText = text; });
    }
    return Promise.resolve();
  });
  Promise.all(readers).then(() => {
    songs.clear();
    for (const [name, data] of Object.entries(files)) {
      if (data.audioBlob && data.lrcText) {
        songs.set(name, data);
      }
    }
    renderSongList();
  });
}

// ── Song Picker ──
function renderSongList() {
  const list = document.getElementById('song-list');
  list.innerHTML = '';
  const sorted = [...songs.keys()].sort((a, b) => a.localeCompare(b, 'de'));
  for (const name of sorted) {
    const li = document.createElement('li');
    const span = document.createElement('span');
    span.className = 'song-name';
    span.textContent = name;
    span.onclick = () => openPlayer(name);
    li.appendChild(span);
    const actions = document.createElement('div');
    actions.className = 'song-actions';
    const playBtn = document.createElement('button');
    playBtn.textContent = 'Play';
    playBtn.onclick = () => openPlayer(name);
    actions.appendChild(playBtn);
    if (isChromium) {
      const editBtn = document.createElement('button');
      editBtn.textContent = 'Edit';
      editBtn.className = 'edit-btn';
      editBtn.onclick = () => openEditor(name);
      actions.appendChild(editBtn);
    }
    li.appendChild(actions);
    list.appendChild(li);
  }
}

// ── View Switching & Hash Router ──
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function navigate(hash) {
  if (location.hash !== hash) location.hash = hash;
  else handleRoute(); // force if already at this hash
}

function handleRoute() {
  const hash = location.hash.slice(1);
  if (hash.startsWith('play/')) {
    const name = decodeURIComponent(hash.slice(5));
    if (songs.has(name)) {
      openPlayer(name, true);
    } else {
      location.hash = '';
    }
  } else if (hash.startsWith('edit/')) {
    const name = decodeURIComponent(hash.slice(5));
    if (songs.has(name) && isChromium) {
      openEditor(name, true);
    } else {
      location.hash = '';
    }
  } else {
    // Stop any playing audio
    document.getElementById('player-audio').pause();
    cancelAnimationFrame(playerAnim);
    document.getElementById('editor-audio').pause();
    cancelAnimationFrame(window._editorAnim);
    showView('picker-view');
  }
}

window.addEventListener('hashchange', handleRoute);

// ── Karaoke Player ──
function openPlayer(name, fromRouter) {
  if (!fromRouter) { navigate('#play/' + encodeURIComponent(name)); return; }
  currentSong = name;
  const song = songs.get(name);
  parsedLines = parseLRC(song.lrcText);
  const audio = document.getElementById('player-audio');
  audio.src = song.audioBlob;
  audio.currentTime = 0;
  showView('player-view');
  renderLyricsDisplay();
  audio.play();
  document.getElementById('play-pause-btn').textContent = '\u23F8';
  startPlayerLoop();
}

function renderLyricsDisplay() {
  const container = document.getElementById('lyrics-display');
  container.innerHTML = '';
  for (let i = 0; i < parsedLines.length; i++) {
    const div = document.createElement('div');
    div.className = 'lyric-line';
    div.dataset.lineIndex = i;
    for (let j = 0; j < parsedLines[i].words.length; j++) {
      const span = document.createElement('span');
      span.className = 'lyric-word';
      span.dataset.wordIndex = j;
      span.textContent = parsedLines[i].words[j].text + ' ';
      div.appendChild(span);
    }
    container.appendChild(div);
  }
}

function startPlayerLoop() {
  cancelAnimationFrame(playerAnim);
  const audio = document.getElementById('player-audio');
  const seekBar = document.getElementById('seek-bar');
  const timeDisplay = document.getElementById('player-time');

  function tick() {
    const t = audio.currentTime;
    const dur = audio.duration || 1;
    seekBar.value = (t / dur) * 100;
    timeDisplay.textContent = `${formatDisplay(t)} / ${formatDisplay(dur)}`;
    updateHighlights(t);
    playerAnim = requestAnimationFrame(tick);
  }
  tick();
}

function updateHighlights(t) {
  const container = document.getElementById('lyrics-display');
  const lineEls = container.querySelectorAll('.lyric-line');

  // Find current line index
  let currentLineIdx = -1;
  for (let i = parsedLines.length - 1; i >= 0; i--) {
    if (t >= parsedLines[i].startTime) {
      currentLineIdx = i;
      break;
    }
  }

  // Determine end time of current line (start of next line)
  const nextLineStart = (currentLineIdx >= 0 && currentLineIdx < parsedLines.length - 1)
    ? parsedLines[currentLineIdx + 1].startTime : Infinity;

  lineEls.forEach((el, i) => {
    el.classList.remove('active', 'upcoming', 'past');
    if (i === currentLineIdx) {
      el.classList.add('active');
    } else if (i < currentLineIdx) {
      el.classList.add('past');
    }

    // Scroll current line into view
    if (i === currentLineIdx) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // Word highlighting
    if (i === currentLineIdx && currentLineIdx >= 0) {
      const line = parsedLines[i];
      const wordEls = el.querySelectorAll('.lyric-word');
      wordEls.forEach((wEl, j) => {
        const word = line.words[j];
        const wordEnd = (j < line.words.length - 1) ? line.words[j + 1].time : nextLineStart;
        wEl.classList.remove('sung', 'singing');
        wEl.style.backgroundImage = '';
        if (t >= wordEnd) {
          wEl.classList.add('sung');
        } else if (t >= word.time) {
          wEl.classList.add('singing');
          const progress = Math.min((t - word.time) / (wordEnd - word.time), 1);
          const pct = (progress * 100).toFixed(1);
          wEl.style.backgroundImage =
            `linear-gradient(90deg, #00e5ff 0%, #e040fb ${pct}%, #fff ${pct}%)`;
        }
      });
    } else {
      // Reset words in non-active lines
      el.querySelectorAll('.lyric-word').forEach(wEl => {
        wEl.classList.remove('sung', 'singing');
        wEl.style.backgroundImage = '';
      });
    }
  });
}

// Player controls
document.getElementById('play-pause-btn').onclick = () => {
  const audio = document.getElementById('player-audio');
  if (audio.paused) {
    audio.play();
    document.getElementById('play-pause-btn').textContent = '\u23F8';
  } else {
    audio.pause();
    document.getElementById('play-pause-btn').textContent = '\u25B6';
  }
};

document.getElementById('seek-bar').oninput = (e) => {
  const audio = document.getElementById('player-audio');
  audio.currentTime = (e.target.value / 100) * audio.duration;
};

document.getElementById('player-back').onclick = () => {
  navigate('#');
};


// ── LRC Editor ──
let editorLines = [];
let editorSongName = null;

function openEditor(name, fromRouter) {
  if (!fromRouter) { navigate('#edit/' + encodeURIComponent(name)); return; }
  editorSongName = name;
  const song = songs.get(name);
  editorLines = parseLRC(song.lrcText);
  document.getElementById('editor-title').textContent = name;
  const audio = document.getElementById('editor-audio');
  audio.src = song.audioBlob;
  audio.currentTime = 0;
  showView('editor-view');
  renderEditorLines();
  startEditorLoop();
}

function renderEditorLines() {
  const container = document.getElementById('editor-lines');
  container.innerHTML = '';

  editorLines.forEach((line, li) => {
    const lineDiv = document.createElement('div');
    lineDiv.className = 'editor-line';
    lineDiv.dataset.lineIndex = li;

    const timeSpan = document.createElement('span');
    timeSpan.className = 'editor-line-time';
    timeSpan.contentEditable = true;
    timeSpan.textContent = formatTime(line.startTime);
    timeSpan.onblur = () => {
      const parsed = parseTimeInput(timeSpan.textContent);
      if (parsed !== null) {
        line.startTime = parsed;
      }
      timeSpan.textContent = formatTime(line.startTime);
    };
    timeSpan.onclick = () => seekAndPlay(line.startTime);
    timeSpan.onkeydown = (e) => {
      if (e.key === 'Enter') { e.preventDefault(); timeSpan.blur(); }
      else if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
        e.preventDefault();
        const caretPos = saveCaretPos(timeSpan);
        const delta = e.key === 'ArrowUp' ? 0.1 : -0.1;
        line.startTime = Math.max(0, line.startTime + delta);
        line.words.forEach(w => { w.time = Math.max(0, w.time + delta); });
        timeSpan.textContent = formatTime(line.startTime);
        restoreCaretPos(timeSpan, caretPos);
        seekAndPlay(line.startTime);
      }
    };
    lineDiv.appendChild(timeSpan);

    const wordsDiv = document.createElement('div');
    wordsDiv.className = 'editor-words';
    wordsDiv.dataset.lineIndex = li;

    line.words.forEach((word, wi) => {
      wordsDiv.appendChild(createWordChip(word, li, wi));
    });

    lineDiv.appendChild(wordsDiv);

    const actions = document.createElement('div');
    actions.className = 'editor-line-actions';

    const addBtn = document.createElement('button');
    addBtn.textContent = '+ Word';
    addBtn.title = 'Add a new word at the end of this line';
    addBtn.onclick = () => {
      const lastWord = line.words[line.words.length - 1];
      const newTime = lastWord ? lastWord.time + 0.5 : line.startTime;
      line.words.push({ time: newTime, text: '...' });
      renderEditorLines();
    };
    actions.appendChild(addBtn);

    const insertBtn = document.createElement('button');
    insertBtn.textContent = '+ Line';
    insertBtn.title = 'Insert a new line after this one';
    insertBtn.onclick = () => {
      const lastWord = line.words[line.words.length - 1];
      const newTime = lastWord ? lastWord.time + 1 : line.startTime + 1;
      editorLines.splice(li + 1, 0, { startTime: newTime, words: [{ time: newTime, text: '...' }] });
      renderEditorLines();
    };
    actions.appendChild(insertBtn);

    const delBtn = document.createElement('button');
    delBtn.textContent = 'Delete line';
    delBtn.className = 'line-delete-btn';
    delBtn.title = 'Remove this entire line';
    delBtn.onclick = () => {
      editorLines.splice(li, 1);
      renderEditorLines();
    };
    actions.appendChild(delBtn);

    lineDiv.appendChild(actions);
    container.appendChild(lineDiv);

    // SortableJS for word drag-and-drop
    new Sortable(wordsDiv, {
      group: 'words',
      animation: 150,
      onEnd: (evt) => {
        const fromLine = parseInt(evt.from.dataset.lineIndex);
        const toLine = parseInt(evt.to.dataset.lineIndex);
        const oldIndex = evt.oldIndex;
        const newIndex = evt.newIndex;
        const [moved] = editorLines[fromLine].words.splice(oldIndex, 1);
        editorLines[toLine].words.splice(newIndex, 0, moved);
        // Update line start times
        editorLines.forEach(l => {
          if (l.words.length > 0) l.startTime = l.words[0].time;
        });
        // Remove empty lines
        editorLines = editorLines.filter(l => l.words.length > 0);
        renderEditorLines();
      }
    });
  });
}

let seekDebounce = null;

function seekAndPlay(time) {
  const audio = document.getElementById('editor-audio');
  clearTimeout(seekDebounce);
  seekDebounce = setTimeout(() => {
    audio.currentTime = Math.max(0, time);
    if (audio.paused) {
      audio.play();
      document.getElementById('editor-play-pause').textContent = '\u23F8';
    }
  }, 80);
}

function createWordChip(word, li, wi) {
  const chip = document.createElement('span');
  chip.className = 'editor-word';

  const timeSpan = document.createElement('span');
  timeSpan.className = 'word-time';
  timeSpan.contentEditable = true;
  timeSpan.textContent = formatTime(word.time);
  timeSpan.onblur = () => {
    const parsed = parseTimeInput(timeSpan.textContent);
    if (parsed !== null) {
      word.time = parsed;
      if (wi === 0) editorLines[li].startTime = word.time;
    }
    timeSpan.textContent = formatTime(word.time);
  };
  timeSpan.onclick = () => seekAndPlay(word.time);
  timeSpan.onkeydown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); timeSpan.blur(); }
    else if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
      e.preventDefault();
      const caretPos = saveCaretPos(timeSpan);
      const delta = e.key === 'ArrowUp' ? 0.1 : -0.1;
      word.time = Math.max(0, word.time + delta);
      if (wi === 0) editorLines[li].startTime = word.time;
      timeSpan.textContent = formatTime(word.time);
      restoreCaretPos(timeSpan, caretPos);
      seekAndPlay(word.time);
    }
  };
  chip.appendChild(timeSpan);

  const textSpan = document.createElement('span');
  textSpan.className = 'word-text';
  textSpan.contentEditable = true;
  textSpan.textContent = word.text;
  textSpan.onclick = () => seekAndPlay(word.time);
  textSpan.onblur = () => {
    word.text = textSpan.textContent.trim() || '...';
  };
  textSpan.onkeydown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); textSpan.blur(); }
  };
  chip.appendChild(textSpan);

  const delBtn = document.createElement('span');
  delBtn.className = 'word-delete';
  delBtn.textContent = '\u00D7';
  delBtn.title = 'Delete this word';
  delBtn.onclick = () => {
    editorLines[li].words.splice(wi, 1);
    if (editorLines[li].words.length === 0) {
      editorLines.splice(li, 1);
    } else if (wi === 0) {
      editorLines[li].startTime = editorLines[li].words[0].time;
    }
    renderEditorLines();
  };
  chip.appendChild(delBtn);

  return chip;
}

function startEditorLoop() {
  const audio = document.getElementById('editor-audio');
  const seekBar = document.getElementById('editor-seek');
  const timeDisplay = document.getElementById('editor-time');
  let editorAnim;

  function tick() {
    const t = audio.currentTime;
    const dur = audio.duration || 1;
    seekBar.value = (t / dur) * 100;
    timeDisplay.textContent = `${formatDisplay(t)} / ${formatDisplay(dur)}`;
    editorAnim = requestAnimationFrame(tick);
  }

  // Clean up previous loop
  cancelAnimationFrame(window._editorAnim);
  window._editorAnim = requestAnimationFrame(function loop() {
    const t = audio.currentTime;
    const dur = audio.duration || 1;
    seekBar.value = (t / dur) * 100;
    timeDisplay.textContent = `${formatDisplayMs(t)} / ${formatDisplayMs(dur)}`;
    updateEditorHighlights(t);
    window._editorAnim = requestAnimationFrame(loop);
  });
}

function updateEditorHighlights(t) {
  const container = document.getElementById('editor-lines');
  const lineEls = container.querySelectorAll('.editor-line');

  // Find current line
  let currentLineIdx = -1;
  for (let i = editorLines.length - 1; i >= 0; i--) {
    if (t >= editorLines[i].startTime) {
      currentLineIdx = i;
      break;
    }
  }

  lineEls.forEach((lineEl, li) => {
    lineEl.classList.toggle('editor-line-active', li === currentLineIdx);
    const wordEls = lineEl.querySelectorAll('.editor-word');
    const line = editorLines[li];
    if (!line) return;

    wordEls.forEach((wEl, wi) => {
      const word = line.words[wi];
      if (!word) return;
      const nextTime = (wi < line.words.length - 1)
        ? line.words[wi + 1].time
        : (li < editorLines.length - 1 ? editorLines[li + 1].startTime : Infinity);
      const isActive = t >= word.time && t < nextTime;
      wEl.classList.toggle('editor-word-active', isActive);
    });
  });
}

document.getElementById('editor-play-pause').onclick = () => {
  const audio = document.getElementById('editor-audio');
  if (audio.paused) {
    audio.play();
    document.getElementById('editor-play-pause').textContent = '\u23F8';
  } else {
    audio.pause();
    document.getElementById('editor-play-pause').textContent = '\u25B6';
  }
};

document.getElementById('editor-seek').oninput = (e) => {
  const audio = document.getElementById('editor-audio');
  audio.currentTime = (e.target.value / 100) * audio.duration;
};

document.getElementById('editor-back').onclick = () => {
  document.getElementById('editor-audio').pause();
  cancelAnimationFrame(window._editorAnim);
  navigate('#');
};

document.getElementById('editor-play-btn').onclick = () => {
  document.getElementById('editor-audio').pause();
  cancelAnimationFrame(window._editorAnim);
  songs.get(editorSongName).lrcText = serializeLRC(editorLines);
  navigate('#play/' + encodeURIComponent(editorSongName));
};

document.getElementById('editor-save-btn').onclick = async () => {
  const song = songs.get(editorSongName);
  const lrcText = serializeLRC(editorLines);
  song.lrcText = lrcText;

  if (song.lrcFileHandle) {
    try {
      const writable = await song.lrcFileHandle.createWritable();
      await writable.write(lrcText);
      await writable.close();
      document.getElementById('editor-save-btn').textContent = 'Saved!';
      setTimeout(() => {
        document.getElementById('editor-save-btn').textContent = 'Save';
      }, 1500);
    } catch (e) {
      alert('Failed to save: ' + e.message);
    }
  } else {
    alert('No file handle available. Save is only supported when using "Open Folder" in Chromium browsers.');
  }
};

document.getElementById('add-line-btn').onclick = () => {
  const lastLine = editorLines[editorLines.length - 1];
  const newTime = lastLine
    ? lastLine.words[lastLine.words.length - 1].time + 1
    : 0;
  editorLines.push({ startTime: newTime, words: [{ time: newTime, text: '...' }] });
  renderEditorLines();
};

// ── Init ──
setupFileLoading();
if (location.hash) history.replaceState(null, '', location.pathname);
</script>
